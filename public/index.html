<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Cards · Node.js Lab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="tablero-wrap">
    <header>
      <p class="etiqueta">LABORATORIO · HTML ↔ EXPRESS ↔ POSTGRES</p>
      <h1>Memory Cards</h1>
    </header>

    <!-- ============================================
         PANTALLA 1: el mini login
         Solo un nombre y un botón. Al entrar, esta
         sección se oculta y aparece el juego.
         ============================================ -->
    <section id="pantalla-login">
      <p class="subtitulo">¿Quién juega hoy?</p>
      <div class="login-form">
        <input type="text" id="input-nombre" placeholder="Tu nombre" maxlength="30" />
        <button id="btn-jugar">Jugar</button>
      </div>
    </section>

    <!-- ============================================
         PANTALLA 2: el juego (oculta al inicio)
         El tablero se construye desde script.js con
         las cartas barajadas — por eso está vacío aquí.
         ============================================ -->
    <section id="pantalla-juego" class="oculto">
      <p class="subtitulo">Jugando: <strong id="nombre-jugador"></strong></p>
      <div class="tablero" id="tablero"></div>

      <h2 class="titulo-historial">Historial (desde São Paulo 🇧🇷)</h2>
      <ul class="historial" id="historial">
        <li class="historial-vacio">Cargando…</li>
      </ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
